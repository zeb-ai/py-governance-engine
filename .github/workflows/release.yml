name: Build and Release Executables

on:
  push:
    tags:
      - "v*"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            artifact_name: z-grc-proxy-macos-arm64
          - os: ubuntu-latest
            artifact_name: z-grc-proxy-linux-x86_64
          - os: ubuntu-24.04-arm
            artifact_name: z-grc-proxy-linux-arm64
          - os: windows-latest
            artifact_name: z-grc-proxy-windows-x64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install

      - name: Install dependencies
        run: uv sync --all-groups --all-extras

      - name: Build executable (one-dir)
        run: uv run pyinstaller z-grc-proxy.spec

      - name: Verify build output
        shell: bash
        run: |
          echo "Contents of dist/:"
          ls -la dist/
          test -d dist/z-grc-proxy || { echo "ERROR: dist/z-grc-proxy folder not found. Check the name= field in your .spec file."; exit 1; }

      - name: Package bundle (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mv dist/z-grc-proxy "dist/${{ matrix.artifact_name }}"
          cd dist
          tar -czvf "${{ matrix.artifact_name }}.tar.gz" "${{ matrix.artifact_name }}"
          ls -lh "${{ matrix.artifact_name }}.tar.gz"

      - name: Package bundle (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Rename-Item -Path "dist/z-grc-proxy" -NewName "${{ matrix.artifact_name }}"
          Compress-Archive -Path "dist/${{ matrix.artifact_name }}" `
                           -DestinationPath "dist/${{ matrix.artifact_name }}.zip"
          Get-ChildItem "dist/${{ matrix.artifact_name }}.zip"

      - name: Upload artifact (Linux/macOS)
        if: runner.os != 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/${{ matrix.artifact_name }}.tar.gz
          if-no-files-found: error

      - name: Upload artifact (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/${{ matrix.artifact_name }}.zip
          if-no-files-found: error

  release:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts
          merge-multiple: true

      - name: List downloaded files
        run: ls -lah ./artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          generate_release_notes: true
          files: ./artifacts/**/*
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
