name: Build and Release Executables

on:
  push:
    tags:
      - "v*"   # triggers when publish.yml creates the tag

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            artifact_name: grc-proxy-macos-arm64
          - os: ubuntu-latest
            artifact_name: grc-proxy-linux-x86_64
          - os: windows-latest
            artifact_name: grc-proxy-windows-x64.exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install

      - name: Install dependencies
        run: uv sync --all-groups --all-extras

      - name: Build executable
        run: uv run pyinstaller governance-engine-proxy.spec

      - name: Rename output (Linux/macOS)
        if: runner.os != 'Windows'
        run: mv dist/grc-proxy dist/${{ matrix.artifact_name }}

      - name: Rename output (Windows)
        if: runner.os == 'Windows'
        run: mv dist/grc-proxy.exe dist/${{ matrix.artifact_name }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/${{ matrix.artifact_name }}

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/**/*
          generate_release_notes: true  # auto-generates changelog from commits
